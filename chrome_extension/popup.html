<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0c0a0f;
      color: #e4e4e7;
      margin: 0;
      padding: 16px;
    }
    h3 {
      margin-top: 0;
      margin-bottom: 4px;
      font-weight: 700;
      font-size: 15px;
      color: #f4f4f5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    p {
      font-size: 11px;
      color: #a1a1aa;
      margin-top: 0;
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .field {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background-color: #18181b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      color: #f4f4f5;
      padding: 8px 10px;
      font-size: 12px;
      outline: none;
      transition: all 0.2s;
    }
    input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
    }
    button {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff;
      margin-bottom: 8px;
    }
    .btn-primary:hover {
      filter: brightness(1.1);
    }
    .btn-secondary {
      background-color: rgba(255, 255, 255, 0.05);
      color: #e4e4e7;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .btn-secondary:hover {
      background-color: rgba(255, 255, 255, 0.08);
    }
    .status {
      font-size: 11px;
      padding: 8px;
      border-radius: 6px;
      margin-top: 12px;
      text-align: center;
      font-weight: 500;
    }
    .status.success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .status.error {
      background-color: rgba(239, 68, 68, 0.1);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .status.idle {
      background-color: rgba(255, 255, 255, 0.03);
      color: #a1a1aa;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <h3>Shopee Grabber 🔌</h3>
  <p>Cấu hình địa chỉ Backend API và theo dõi trạng thái đồng bộ dữ liệu Shopee.</p>
  
  <div class="field">
    <label for="api-url">Backend API URL</label>
    <input type="text" id="api-url" placeholder="http://localhost:8000">
  </div>
  
  <button class="btn-primary" id="save-btn">Lưu cấu hình</button>
  <button class="btn-secondary" id="recrawl-btn">Cào lại trang hiện tại</button>
  
  <div class="status idle" id="status-box">
    Chưa lưu cấu hình mới
  </div>

  <script src="popup.js"></script>
</body>
</html>
